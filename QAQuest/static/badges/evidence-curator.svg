<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-evidence" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980B9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B4965;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#grad-evidence)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  <!-- Camera icon -->
  <g transform="translate(60, 60)">
    <!-- Camera body -->
    <rect x="-16" y="-12" width="32" height="24" fill="none" stroke="white" stroke-width="2.5" rx="2"/>
    <!-- Lens -->
    <circle cx="0" cy="2" r="10" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="2" r="5" fill="white"/>
    <!-- Flash -->
    <rect x="10" y="-8" width="4" height="4" fill="white" rx="1"/>
  </g>
</svg>