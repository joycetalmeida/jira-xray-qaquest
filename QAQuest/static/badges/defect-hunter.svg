<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-hunter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E85D75;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C42953;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#grad-hunter)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  <!-- Target/crosshair icon -->
  <g transform="translate(60, 60)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="white"/>
    <!-- Crosshairs -->
    <line x1="-30" y1="0" x2="-25" y2="0" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="25" y1="0" x2="30" y2="0" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-30" x2="0" y2="-25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="25" x2="0" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>