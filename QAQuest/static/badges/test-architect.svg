    <rect x="-9" y="-12" width="6" height="6" fill="white" rx="1"/>
    <rect x="3" y="-12" width="6" height="6" fill="white" rx="1"/>
    <rect x="13" y="-12" width="6" height="6" fill="white" rx="1"/>
    <rect x="-19" y="-2" width="6" height="6" fill="white" rx="1"/>
    <rect x="-9" y="-2" width="6" height="6" fill="white" rx="1"/>
