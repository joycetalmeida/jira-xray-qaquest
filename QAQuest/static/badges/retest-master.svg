    <!-- Top arrow -->
    <path d="M -2,-20 Q -18,-20 -18,0" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="-18,-3 -24,-8 -16,-10" fill="white"/>
    <!-- Bottom arrow -->
    <path d="M 2,20 Q 18,20 18,0" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
