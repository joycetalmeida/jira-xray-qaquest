<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-traceability" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8E44AD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B2C6F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#grad-traceability)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  <!-- Connected nodes icon -->
  <g transform="translate(60, 60)">
    <!-- Top nodes -->
    <circle cx="-12" cy="-10" r="4" fill="white"/>
    <circle cx="12" cy="-10" r="4" fill="white"/>
    <!-- Bottom node -->
    <circle cx="0" cy="12" r="4" fill="white"/>
    <!-- Connecting lines -->
    <line x1="-10" y1="-8" x2="10" y2="-8" stroke="white" stroke-width="2"/>
    <line x1="-9" y1="-8" x2="1" y2="10" stroke="white" stroke-width="2"/>
    <line x1="9" y1="-8" x2="-1" y2="10" stroke="white" stroke-width="2"/>
  </g>
</svg>