<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-coverage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A93226;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#grad-coverage)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  <!-- Coverage gauge icon -->
  <g transform="translate(60, 60)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <!-- Filled pie segment (coverage) -->
    <path d="M 0,-18 A 18,18 0 0,1 12.7,12.7 L 8.5,8.5 A 12,12 0 0,0 0,-12 Z" fill="white" opacity="0.9"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="white"/>
  </g>
</svg>